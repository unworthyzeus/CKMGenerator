model:
  checkpoint: models/best_model.pt
  source_checkpoint: C:/TFG/TFGpractice/cluster_outputs/TFGEightiethTry80/try80_joint_huge_pathloss_finetune/best_model.pt
  model_cfg:
    in_channels: 9
    cond_dim: 160
    height_embed_dim: 32
    base_width: 128
    num_components: 3
    decoder_dropout: 0.10
    alpha_bias: -2.0
    sigma_min: 0.05
    sigma_max: 3.0
    path_residual_los_max: 7.0
    path_residual_nlos_max: 25.0
    delay_residual_los_max: 20.0
    delay_residual_nlos_max: 20.0
    angular_residual_los_max: 17.0
    angular_residual_nlos_max: 15.0

priors:
  try78_los_calibration_json: calibrations/try78_los_two_ray_calibration.json
  try78_nlos_calibration_json: calibrations/try78_nlos_regime_calibration.json
  try79_calibration_json: calibrations/try79_calibration.json

io:
  image_size: 513
  topology_norm_m: 90.0
  height_min_m: 10.0
  height_max_m: 478.0

los:
  exact_reference_hdf5: C:/TFG/TFGpractice/Datasets/CKM_Dataset_270326.h5
  rx_height_m: 1.5
  sample_step_px: 0.25
  clearance_m: 0.0
  building_dilation_px: 0
  chunk_size: 4096

runtime:
  device_priority:
    - cuda
    - directml
    - cpu
  batch_size: auto
  directml_batch_size_note: DirectML has higher VRAM overhead; batch 1 is the safe default on RX 7800 XT class GPUs.
